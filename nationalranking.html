<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Chess Rankings - CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            padding-top: 70px;
        }

        .chess-header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 70px;
            background-color: #0f172a;
            background-image: 
              linear-gradient(45deg, #1e293b 25%, transparent 25%, transparent 75%, #1e293b 75%, #1e293b),
              linear-gradient(45deg, #1e293b 25%, transparent 25%, transparent 75%, #1e293b 75%, #1e293b);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .header-back {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
            width: 80px; 
        }
        .header-back:hover { color: #ffffff; }

        .header-title {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
            text-align: center;
            flex: 1;
        }

        /* --- Main Layout Fixed --- */
        .ranking-container {
            width: 100%; /* Strictly lock width */
            max-width: 1000px;
            margin: 2rem auto 5rem auto;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .ranking-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 15px;
        }

        .ranking-info h2 { margin: 0 0 5px 0; color: #0f172a; font-size: 1.5rem; }
        .ranking-info p { margin: 0; color: #64748b; font-size: 0.9rem; font-weight: 500; }

        .search-container { position: relative; width: 100%; max-width: 300px; }
        .search-input {
            width: 100%; padding: 10px 15px 10px 35px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-size: 0.95rem; font-family: inherit; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s; background: #ffffff;
        }
        .search-input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8; }

        /* --- Data Table CSS OVERHAUL FOR MOBILE SCROLL --- */
        .table-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            width: 100%;
            overflow: hidden; /* CRITICAL: Traps the table from expanding the page */
        }

        .table-wrapper {
            width: 100%;
            max-height: 70vh;
            overflow-x: auto; /* CRITICAL: Enables horizontal scroll inside the card */
            overflow-y: auto; /* Enables vertical scroll */
            -webkit-overflow-scrolling: touch;
            display: block;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 650px; /* CRITICAL: Forces table to be wide, creating the scroll */
            text-align: left;
        }

        .ranking-table th {
            position: sticky;
            top: 0;
            background: #f8fafc;
            padding: 1.2rem 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
            z-index: 10;
            white-space: nowrap; /* Stops text wrapping */
        }

        .ranking-table td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 600;
            vertical-align: middle;
            white-space: nowrap; /* Stops text wrapping */
        }

        .ranking-table tr:last-child td { border-bottom: none; }
        .ranking-table tr:hover td { background: #fefce8; }

        .ranking-table tr.rank-1 td { background: linear-gradient(90deg, rgba(253, 230, 138, 0.4) 0%, transparent 100%); }
        .ranking-table tr.rank-2 td { background: linear-gradient(90deg, rgba(226, 232, 240, 0.6) 0%, transparent 100%); }
        .ranking-table tr.rank-3 td { background: linear-gradient(90deg, rgba(254, 215, 170, 0.4) 0%, transparent 100%); }

        .rank-num { font-size: 1.15rem; font-weight: 800; color: #0f172a; }
        .rank-1 .rank-num { color: #b45309; } 
        .rank-2 .rank-num { color: #475569; } 
        .rank-3 .rank-num { color: #9a3412; } 

        .rating-box {
            font-family: monospace;
            font-size: 1.05rem;
            font-weight: 700;
            color: #2563EB;
            background: #eff6ff;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #bfdbfe;
            display: inline-block;
        }

        .fide-badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; min-width: 45px; text-align: center;}
        .badge-gm { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: white; border: 1px solid #b45309; }
        .badge-im { background: linear-gradient(135deg, #94a3b8 0%, #475569 100%); color: white; border: 1px solid #334155; }
        .badge-fm { background: linear-gradient(135deg, #fdba74 0%, #c2410c 100%); color: white; border: 1px solid #9a3412; }
        .badge-cm { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .badge-none { background: transparent; color: #94a3b8; font-weight: 500; border: 1px dashed #cbd5e1;}

        @media (max-width: 600px) {
            .ranking-top-bar { flex-direction: column; align-items: flex-start; }
            .search-container { max-width: 100%; }
        }
    </style>
</head>

        function getTitleBadge(title) {
            if (!title) return `<span class="fide-badge badge-none">-</span>`;
            
            const upperTitle = title.toUpperCase();
            let badgeClass = 'badge-none';
            
            if (upperTitle === 'GM' || upperTitle === 'WGM') badgeClass = 'badge-gm';
            else if (upperTitle === 'IM' || upperTitle === 'WIM') badgeClass = 'badge-im';
            else if (upperTitle === 'FM' || upperTitle === 'WFM') badgeClass = 'badge-fm';
            else if (upperTitle === 'CM' || upperTitle === 'WCM' || upperTitle === 'AIM' || upperTitle === 'AGM') badgeClass = 'badge-cm';
            
            return `<span class="fide-badge ${badgeClass}">${upperTitle}</span>`;
        }

        function renderTable(data) {
            const tbody = document.getElementById('ranking-tbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 3rem; color: #64748b;">No players found.</td></tr>`;
                return;
            }

            data.forEach(player => {
                let rowClass = "";
                let rankDisplay = player.rank;

                if (player.rank === 1) { rowClass = "rank-1"; rankDisplay = "🥇 1"; }
                else if (player.rank === 2) { rowClass = "rank-2"; rankDisplay = "🥈 2"; }
                else if (player.rank === 3) { rowClass = "rank-3"; rankDisplay = "🥉 3"; }

                const tr = document.createElement('tr');
                if (rowClass) tr.className = rowClass;

                tr.innerHTML = `
                    <td style="text-align: center;"><span class="rank-num">${rankDisplay}</span></td>
                    <td>${getTitleBadge(player.title)}</td>
                    <td>${player.name}</td>
                    <td style="text-align: right;"><span class="rating-box">${player.rating}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterRankings() {
            const query = document.getElementById('rankingSearch').value.toLowerCase();
            const filtered = rankingData.filter(p => p.name.toLowerCase().includes(query));
            renderTable(filtered);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTable(rankingData);
        });
