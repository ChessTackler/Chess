<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CDCA PREMIUM LIGHT (WHITE) THEME
        ========================================= */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* White/Light background with subtle grey checkered pattern */
            background-color: #f8fafc; 
            background-image: 
              linear-gradient(45deg, #e2e8f0 25%, transparent 25%, transparent 75%, #e2e8f0 75%, #e2e8f0),
              linear-gradient(45deg, #e2e8f0 25%, transparent 25%, transparent 75%, #e2e8f0 75%, #e2e8f0);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Inter', sans-serif;
            color: #0f172a; /* Dark Slate Text */
            text-align: center;
            overflow: hidden;
        }

        .error-container {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 3.5rem 2.5rem;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            /* Professional shadow for white theme */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- STRICT ANTI-DOWNLOAD CSS --- */
        .no-interact {
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none; /* Firefox */
            -ms-user-select: none; /* IE10+/Edge */
            user-select: none; /* Standard */
            -webkit-user-drag: none; /* Prevents dragging to desktop */
            pointer-events: none; /* Kills ALL hover/click events */
        }

        /* The Error Image Container */
        .image-secure-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .error-image {
            width: 100%;
            max-width: 250px;
            height: auto;
            /* Anti-copy/drag applied via JS and Class below */
        }

        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #d0a756; /* CDCA Gold Accent */
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .error-message {
            color: #475569; /* Muted slate text */
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Return Button (Premium CDCA Gold) */
        .return-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #d0a756 0%, #b4883a 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(208, 167, 86, 0.3);
        }

        .return-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 167, 86, 0.4);
            background: linear-gradient(135deg, #dfb767 0%, #c49646 100%);
        }

        .return-btn:active {
            transform: translateY(0);
        }

        .redirect-text {
            display: block;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .redirect-text span {
            color: #d0a756;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="error-container">
        
        <div class="image-secure-wrap">
            <img src="error404.png" alt="Page Under Construction" class="error-image no-interact" id="secureImage" draggable="false" onerror="this.style.display='none'">
        </div>
        
        <h1 class="error-title">Page Under Construction</h1>
        <p class="error-message">The digital board is still being set up. The page you are looking for hasn't been coded yet or was moved off the board.</p>
        
        <a href="index.html" class="return-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Return to Portal
        </a>

        <span class="redirect-text">Redirecting to homepage in <span id="countdown">5</span>s</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // ── Strict Anti-Right-Click for the image ──
            const secureImg = document.getElementById('secureImage');
            
            // Re-confirming pointer-events via JS just in case CSS fails
            secureImg.style.pointerEvents = 'none';

            // Catch any context menu attempts (right-click) specifically on the image
            secureImg.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                return false;
            });


            // ── Redirection Countdown ──
            let timeLeft = 5;
            const countdownElement = document.getElementById('countdown');

            const timer = setInterval(() => {
                timeLeft--;
                countdownElement.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    window.location.href = 'index.html'; // Redirects to homepage
                }
            }, 1000);
        });
    </script>
</body>
</html>
