<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CDCA PREMIUM LIGHT (WHITE) THEME
        ========================================= */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* White/Light background with subtle grey checkered pattern */
            background-color: #f8fafc; 
            background-image: 
              linear-gradient(45deg, #e2e8f0 25%, transparent 25%, transparent 75%, #e2e8f0 75%, #e2e8f0),
              linear-gradient(45deg, #e2e8f0 25%, transparent 25%, transparent 75%, #e2e8f0 75%, #e2e8f0);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Inter', sans-serif;
            color: #0f172a; 
            text-align: center;
            overflow: hidden;
        }

        .error-container {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 3rem 2rem 3.5rem 2rem;
            border-radius: 20px;
            max-width: 550px; /* Widened to allow a larger central image */
            width: 92%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes floatUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- STRICT ANTI-DOWNLOAD CSS --- */
        .no-interact {
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
            -webkit-user-drag: none; 
            pointer-events: none; 
        }

        /* The Error Image Container (LARGE CENTRAL FOCUS) */
        .image-secure-wrap {
            position: relative;
            display: block;
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .error-image {
            width: 100%;
            max-width: 420px; /* Much larger central focus */
            height: auto;
            object-fit: contain;
        }

        /* Minimal Small Texts */
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; /* Shrunk to be minimal */
            font-weight: 700;
            color: #d0a756; 
            margin: 0 0 8px 0;
            line-height: 1.2;
        }

        .error-message {
            color: #64748b; 
            font-size: 0.9rem; /* Shrunk to be minimal */
            line-height: 1.5;
            margin-bottom: 2rem;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        /* Return Button */
        .return-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #d0a756 0%, #b4883a 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(208, 167, 86, 0.3);
        }

        .return-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(208, 167, 86, 0.4);
            background: linear-gradient(135deg, #dfb767 0%, #c49646 100%);
        }

        .return-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="error-container">
        
        <div class="image-secure-wrap">
            <img src="error404.png" alt="404 Error" class="error-image no-interact" id="secureImage" draggable="false" onerror="this.style.display='none'">
        </div>
        
        <h1 class="error-title">Page Under Construction</h1>
        <p class="error-message">The digital board is still being set up. This module hasn't been coded yet.</p>
        
        <a href="index.html" class="return-btn">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Return to Homepage
        </a>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ── Strict Anti-Right-Click for the image ──
            const secureImg = document.getElementById('secureImage');
            
            // Re-confirming pointer-events via JS just in case CSS fails
            if (secureImg) {
                secureImg.style.pointerEvents = 'none';

                // Catch any context menu attempts (right-click) specifically on the image
                secureImg.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    return false;
                });
            }
        });
    </script>
</body>
</html>
