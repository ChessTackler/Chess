<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <a href="index.html" class="logo"><img src="LogoCDCA.png" alt="CDCA"></a>
        <nav><a href="index.html">← Back to Home</a></nav>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Create Account</h2>
            <p>Register to request database edit access.</p>

            <form id="signup-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required minlength="6">
                </div>
                <button type="submit" class="btn-orange" style="width: 100%;">Register Account</button>
                <div id="msg" class="message-box"></div>
            </form>

            <div class="switch-page">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <script src="app.js?v=1"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgEl = document.getElementById('msg');
            msgEl.innerText = "Creating account...";
            msgEl.style.color = "var(--text-muted)";

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (!window.supabaseClient) {
                    throw new Error("Cannot connect to server. Please refresh.");
                }

                const { data, error } = await window.supabaseClient.auth.signUp({ email, password });
                if (error) throw error;

                msgEl.innerText = "Account created! Redirecting...";
                msgEl.style.color = "#27AE60"; 
                setTimeout(() => window.location.href = 'index.html', 1500); 

            } catch (error) {
                console.error("Signup Error:", error);
                msgEl.innerText = error.message;
                msgEl.style.color = "#E74C3C"; 
            }
        });
    </script>
</body>
</html>
