<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDCA Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="news-detail.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</head>
<body>

    <header class="editorial-header">
        <a href="index.html" class="logo-wrapper">
            <span class="logo-text">guardian<span style="color:#c50000;">.cdca</span></span>
        </a>
    </header>

    <main class="article-container" id="article-wrapper">
        <div class="loader-container" id="loading-state">
            <div class="loader"></div>
            <p>Fetching article...</p>
        </div>
        
        <div id="article-content" style="display: none;">
            
            <div class="article-header">
                <a href="index.html" class="back-link">« Back to News</a>
                
                <div class="tags-container" id="detail-tags"></div>
                <h1 class="article-title" id="detail-title"></h1>
                
                <div class="article-meta-box">
                    <span class="meta-author">By <strong id="detail-author"></strong></span>
                    <span class="meta-divider">|</span>
                    <span class="meta-date" id="detail-date"></span>
                </div>
            </div>

            <div class="article-hero-image" id="detail-hero-wrapper" style="display: none;">
                <img id="detail-hero-img" src="" alt="Article Cover">
            </div>

            <div class="article-body" id="detail-body"></div>

            <div id="additional-gallery" class="gallery-grid"></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');

            if (!articleId || !window.supabaseClient) {
                document.getElementById('loading-state').innerHTML = "<h3>Article not found.</h3>";
                return;
            }

            const { data: article, error } = await window.supabaseClient
                .from('news_articles')
                .select('*')
                .eq('id', articleId)
                .single();

            if (error || !article) {
                document.getElementById('loading-state').innerHTML = "<h3>Error loading article.</h3>";
                return;
            }

            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('article-content').style.display = 'block';

            document.title = `${article.title} - CDCA News`;
            document.getElementById('detail-title').innerText = article.title;
            document.getElementById('detail-author').innerText = article.author || 'CDCA Admin';
            
            const dateObj = new Date(article.created_at);
            document.getElementById('detail-date').innerText = dateObj.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            // Tags
            if (article.tags) {
                const tagsHtml = article.tags.split(',').map(tag => `<span class="category-tag">${tag.trim()}</span>`).join('');
                document.getElementById('detail-tags').innerHTML = tagsHtml;
            }

            // Image
            if (article.image_url) {
                const heroWrapper = document.getElementById('detail-hero-wrapper');
                heroWrapper.style.display = 'block';
                document.getElementById('detail-hero-img').src = article.image_url;
            }

            // --- TEXT FORMATTING ENGINE (MARKDOWN) ---
            if (article.content) {
                let rawText = window.escapeHTML(article.content);
                
                // 1. Process Bold & Italics
                rawText = rawText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                rawText = rawText.replace(/\*(.*?)\*/g, '<em>$1</em>');
                
                // 2. Process Subheadings
                rawText = rawText.replace(/^### (.*$)/gim, '<h3 class="article-subhead">$1</h3>');
                rawText = rawText.replace(/^## (.*$)/gim, '<h2 class="article-subhead">$1</h2>');

                // 3. Process Paragraphs
                const paragraphs = rawText.split(/\n\s*\n/);
                const formattedHTML = paragraphs.map((p, index) => {
                    let cleanP = p.replace(/\n/g, '<br>');
                    // Give the very first paragraph a special "standfirst" class to make it bold and larger
                    if (index === 0 && !cleanP.startsWith('<h')) {
                        return `<p class="standfirst">${cleanP}</p>`;
                    }
                    if (cleanP.startsWith('<h')) return cleanP;
                    return `<p>${cleanP}</p>`;
                }).join('');
                
                document.getElementById('detail-body').innerHTML = formattedHTML;
            }

            // Gallery
            if (article.additional_images && Array.isArray(article.additional_images) && article.additional_images.length > 0) {
                const galleryContainer = document.getElementById('additional-gallery');
                galleryContainer.innerHTML = '<h3 class="gallery-title">In Pictures</h3>';
                article.additional_images.forEach(imgUrl => {
                    const imgEl = document.createElement('img');
                    imgEl.src = imgUrl;
                    imgEl.className = 'gallery-img';
                    imgEl.onerror = function() { this.style.display = 'none'; };
                    galleryContainer.appendChild(imgEl);
                });
            }
        });
    </script>
</body>
</html>
