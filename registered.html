<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Database - CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registered.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="app-header">
        <div class="brand-zone">
            <span class="header-title">Private Directory</span>
        </div>
        <div style="display: flex; gap: 1rem;">
            <a href="admin.html" class="btn-return">Dashboard</a>
            <button onclick="window.handleLogout()" class="btn-logout">End Session</button>
        </div>
    </header>

    <div class="container db-container" id="admin-content">
        <div class="page-header">
            <span class="secure-badge">🔒 Encrypted Access</span>
            <h1 class="portal-title">Registered Players List</h1>
            <p class="portal-subtitle">Click on any player row below to securely expand and view their private documents and details.</p>
        </div>

        <div class="data-card">
            <div class="toolbar">
                <h3>Directory Search</h3>
                <input type="text" id="regSearchInput" class="search-input" placeholder="Search Name or Mobile..." onkeyup="window.filterRegisteredList()">
            </div>
            <table class="interactive-table">
                <thead>
                    <tr><th>Player Name</th><th>Mobile Number</th><th>Generated ID</th><th>Status</th><th style="text-align: right;">Action</th></tr>
                </thead>
                <tbody id="registered-tbody"></tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
    <script src="registered.js"></script>
</body>
</html>
