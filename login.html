<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: var(--bg-light);">

    <div class="container">
        <div class="auth-container" style="background: white;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="LogoCDCA.png" alt="CDCA Logo" style="height: 60px;">
                <h2 style="margin-top: 1rem; color: var(--primary-blue);">Admin Access</h2>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-orange" style="width: 100%; margin-top: 1rem; border-radius: 4px;">Sign In</button>
                <p id="error-msg" style="color: red; font-size: 0.85rem; margin-top: 1rem; text-align: center;"></p>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.innerText = "Authenticating...";
            const success = await handleLogin(email, password);
            
            if(success) {
                window.location.href = 'admin.html';
            } else {
                errorMsg.innerText = "Invalid login credentials.";
            }
        });
    </script>
</body>
</html>
