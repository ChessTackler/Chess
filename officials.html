<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDCA Officials</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --primary-purple: #8121d8;
        --secondary-pink: #d81b85;
        --text-dark: #1a1a1a;
        --text-gray: #666666;
        --bg: #faf8ff;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
        font-family: 'DM Sans', sans-serif;
        margin: 0;
        padding: 60px 20px;
        background-color: var(--bg);
        background-image:
            radial-gradient(ellipse at 10% 10%, rgba(129,33,216,0.07) 0%, transparent 55%),
            radial-gradient(ellipse at 90% 90%, rgba(216,27,133,0.06) 0%, transparent 55%);
        min-height: 100vh;
    }

    .section-header {
        text-align: left;
        max-width: 1200px;
        margin: 0 auto 60px auto;
        padding-left: 20px;
        border-left: 4px solid var(--primary-purple);
    }

    .section-subtitle {
        font-size: 0.78rem;
        letter-spacing: 3px;
        color: var(--secondary-pink);
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 6px;
        display: block;
    }

    .section-title {
        font-family: 'Playfair Display', serif;
        font-size: 3rem;
        color: var(--primary-purple);
        margin: 0;
        font-weight: 800;
        line-height: 1.1;
    }

    .team-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 50px 30px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .team-member {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: fadeUp 0.6s ease both;
    }

    .team-member:nth-child(1) { animation-delay: 0.1s; }
    .team-member:nth-child(2) { animation-delay: 0.2s; }
    .team-member:nth-child(3) { animation-delay: 0.3s; }
    .team-member:nth-child(4) { animation-delay: 0.4s; }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Blob wrapper ── */
    .image-wrap {
        position: relative;
        width: 220px;
        height: 220px;
        margin-bottom: 24px;
        transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    }

    .team-member:hover .image-wrap {
        transform: translateY(-8px) scale(1.04);
    }

    /* Glow behind */
    .image-wrap::before {
        content: '';
        position: absolute;
        inset: 10px;
        background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
        filter: blur(20px);
        opacity: 0.35;
        z-index: 0;
        transition: opacity 0.4s ease;
    }
    .team-member:hover .image-wrap::before { opacity: 0.6; }

    /* Gradient border ring */
    .image-wrap::after {
        content: '';
        position: absolute;
        inset: -3px;
        background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
        z-index: 1;
    }

    /* Inner white mask so border shows */
    .image-inner {
        position: absolute;
        inset: 3px;
        overflow: hidden;
        z-index: 2;
        background: #fff;
    }

    .image-inner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        display: block;
        transition: transform 0.5s ease;
    }

    .team-member:hover .image-inner img {
        transform: scale(1.06);
    }

    /* Placeholder */
    .image-inner .placeholder {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ede0fb, #fce4f4);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ── Blob shapes ── */
    .blob-1::after, .blob-1::before, .blob-1 .image-inner { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
    .blob-2::after, .blob-2::before, .blob-2 .image-inner { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    .blob-3::after, .blob-3::before, .blob-3 .image-inner { border-radius: 30% 70% 70% 30% / 50% 60% 40% 50%; }
    .blob-4::after, .blob-4::before, .blob-4 .image-inner { border-radius: 50% 50% 40% 60% / 40% 60% 40% 60%; }

    /* Typography */
    .role {
        color: var(--primary-purple);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin: 0 0 6px 0;
    }

    .name {
        font-family: 'Playfair Display', serif;
        color: var(--text-dark);
        font-size: 1.15rem;
        font-weight: 700;
        margin: 0 0 6px 0;
        line-height: 1.3;
    }

    .extra-info {
        color: var(--secondary-pink);
        font-size: 0.82rem;
        font-weight: 500;
        margin: 0;
    }
</style>
</head>
<body>

<section>
    <div class="section-header">
        <span class="section-subtitle">CDCA Officials</span>
        <h2 class="section-title">Our People</h2>
    </div>

    <div class="team-grid">

        <div class="team-member">
            <div class="image-wrap blob-1">
                <div class="image-inner">
                    <img src="https://i.postimg.cc/JzgXpvZD/img-1-1777146752817.jpg"
                         alt="Dr. Manoj Kumar Verma">
                </div>
            </div>
            <p class="role">President, CDCA</p>
            <h3 class="name">Dr. Manoj Kumar Verma 'SANKALP'</h3>
            <p class="extra-info">president@cdca.example</p>
        </div>

        <div class="team-member">
            <div class="image-wrap blob-2">
                <div class="image-inner">
                    <img src="https://i.postimg.cc/L6QgswyT/img-1-1777146861808.jpg"
                         alt="Arbind Kumar Singh">
                </div>
            </div>
            <p class="role">Secretary, CDCA</p>
            <h3 class="name">Arbind Kumar Singh</h3>
            <p class="extra-info">Int. Arbiter | National Instructor</p>
        </div>

        <div class="team-member">
            <div class="image-wrap blob-3">
                <div class="image-inner">
                    <div class="placeholder">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#8121d8" stroke-width="1.2" opacity="0.4">
                            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                        </svg>
                    </div>
                </div>
            </div>
            <p class="role">Treasurer</p>
            <h3 class="name">Jane Doe</h3>
            <p class="extra-info">jane.doe@example.com</p>
        </div>

        <div class="team-member">
            <div class="image-wrap blob-4">
                <div class="image-inner">
                    <div class="placeholder">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#8121d8" stroke-width="1.2" opacity="0.4">
                            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                        </svg>
                    </div>
                </div>
            </div>
            <p class="role">Joint Secretary</p>
            <h3 class="name">John Smith</h3>
            <p class="extra-info">john.smith@example.com</p>
        </div>

    </div>
</section>

</body>
</html>
