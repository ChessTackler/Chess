<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDCA Officials</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    :root {
        --purple:       #7416c8;
        --purple-light: #9b4de0;
        --pink:         #c8177a;
        --gold:         #b8860b;
        --dark:         #12001f;
        --mid:          #4a3670;
        --text:         #1c1230;
        --text-soft:    #5a4d78;
        --bg:           #ffffff;
        --bg-tint:      #faf7ff;
        --line:         #e8e0f5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
    }

    /* Very subtle texture */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse at 0% 0%,   rgba(116,22,200,0.045) 0%, transparent 50%),
            radial-gradient(ellipse at 100% 100%, rgba(200,23,122,0.035) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
    }

    .main-content {
        padding: 72px 28px 88px;
        position: relative; 
        z-index: 1; 
    }

    /* ── Header ── */
    .section-header {
        max-width: 1200px;
        margin: 0 auto 72px auto;
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .header-eyebrow { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .eyebrow-line { width: 40px; height: 2px; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 2px; flex-shrink: 0; }
    
    .section-subtitle {
        font-family: 'Outfit', sans-serif; font-size: 0.7rem; font-weight: 600;
        letter-spacing: 4px; text-transform: uppercase; color: var(--purple);
    }

    .section-title {
        font-family: 'Cormorant Garamond', serif; font-size: 4rem; font-weight: 700;
        color: var(--text); line-height: 1; letter-spacing: -1.5px;
    }

    .section-title em {
        font-style: italic; background: linear-gradient(110deg, var(--purple), var(--pink));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .header-rule {
        margin-top: 28px; height: 1px; background: linear-gradient(90deg, var(--line), transparent 70%);
        max-width: 1200px; margin-left: auto; margin-right: auto;
    }

    /* ── Grid ── */
    .team-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 56px 24px; max-width: 1200px; margin: 56px auto 0;
    }

    /* ── Card ── */
    .team-member {
        display: flex; flex-direction: column; align-items: center; text-align: center;
        animation: riseIn 0.65s cubic-bezier(.22,1,.36,1) both;
    }
    
    /* Dynamic Staggering generated by JS */
    @keyframes riseIn {
        from { opacity: 0; transform: translateY(28px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Image blob ── */
    .image-wrap {
        position: relative; width: 210px; height: 210px; margin-bottom: 28px;
        transition: transform 0.45s cubic-bezier(.34,1.45,.64,1);
    }

    .team-member:hover .image-wrap { transform: translateY(-8px) scale(1.03); }

    .image-wrap::before {
        content: ''; position: absolute; inset: 4px;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        opacity: 0.22; filter: blur(18px); z-index: 0; transition: opacity 0.45s ease;
    }
    .team-member:hover .image-wrap::before { opacity: 0.42; }

    .image-wrap::after {
        content: ''; position: absolute; inset: -3px;
        background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 60%, #e8a020 100%);
        z-index: 1; transition: opacity 0.4s ease;
    }

    .image-inner { position: absolute; inset: 3px; overflow: hidden; z-index: 2; background: var(--bg-tint); }

    .image-inner img {
        width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block;
        transform: translateZ(0) scale(1.01); -webkit-backface-visibility: hidden; backface-visibility: hidden;
        filter: contrast(1.07) saturate(1.08) brightness(1.01); transition: transform 0.5s ease, filter 0.4s ease;
    }

    .team-member:hover .image-inner img { transform: translateZ(0) scale(1.07); filter: contrast(1.1) saturate(1.15) brightness(1.03); }

    .image-inner .placeholder {
        width: 100%; height: 100%; background: linear-gradient(145deg, #f0e8ff, #fde8f4);
        display: flex; align-items: center; justify-content: center;
    }

    /* ── Blob shapes ── */
    .blob-1::after, .blob-1::before, .blob-1 .image-inner { border-radius: 42% 58% 68% 32% / 38% 52% 58% 52%; }
    .blob-2::after, .blob-2::before, .blob-2 .image-inner { border-radius: 62% 38% 28% 72% / 58% 32% 68% 42%; }
    .blob-3::after, .blob-3::before, .blob-3 .image-inner { border-radius: 32% 68% 68% 32% / 52% 58% 42% 48%; }
    .blob-4::after, .blob-4::before, .blob-4 .image-inner { border-radius: 52% 48% 42% 58% / 42% 58% 42% 58%; }

    /* ── Member info ── */
    .member-info { display: flex; flex-direction: column; align-items: center; gap: 5px; }

    .role {
        font-family: 'Outfit', sans-serif; font-size: 0.68rem; font-weight: 700;
        letter-spacing: 3px; text-transform: uppercase; color: var(--purple); margin-bottom: 2px;
    }

    .name { font-family: 'Cormorant Garamond', serif; font-size: 1.32rem; font-weight: 600; color: var(--text); line-height: 1.25; }

    .divider {
        width: 28px; height: 1.5px; background: linear-gradient(90deg, var(--purple), var(--pink));
        border-radius: 2px; margin: 4px auto 2px;
    }

    .tag { font-family: 'Outfit', sans-serif; font-size: 0.74rem; font-weight: 400; color: var(--text-soft); line-height: 1.6; }

    /* Custom Loader */
    .officials-loader {
        width: 40px; height: 40px; margin: 0 auto;
        border: 3px solid var(--line); border-top-color: var(--purple);
        border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="main-nav"></div>

<section class="main-content">
    <div class="section-header">
        <div class="header-eyebrow">
            <div class="eyebrow-line"></div>
            <span class="section-subtitle">CDCA Officials</span>
        </div>
        <h2 class="section-title">Our <em>People</em></h2>
    </div>

    <div class="header-rule"></div>

    <div class="team-grid" id="officials-grid">
        <div style="text-align: center; width: 100%; grid-column: 1 / -1; padding: 3rem;">
            <div class="officials-loader"></div>
            <p style="color: var(--text-soft); margin-top: 15px;">Loading directory...</p>
        </div>
    </div>
</section>

<script src="app.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const grid = document.getElementById('officials-grid');
    
    // Safety check for initialized Supabase client
    if (!window.supabaseClient) {
        grid.innerHTML = '<div style="text-align:center; width:100%; grid-column: 1/-1; color: var(--text-soft);">Database connection not established.</div>';
        return;
    }

    try {
        // Fetch officials from Supabase DB, ordered by display_order
        const { data: officials, error } = await window.supabaseClient
            .from('cdca_officials')
            .select('*')
            .order('display_order', { ascending: true });

        if (error) throw error;

        if (!officials || officials.length === 0) {
            grid.innerHTML = '<div style="text-align:center; width:100%; grid-column: 1/-1; color: var(--text-soft);">No officials found in the database.</div>';
            return;
        }

        grid.innerHTML = ''; // Clear loading state

        officials.forEach((official, index) => {
            // Cycle dynamically through blob-1, blob-2, blob-3, blob-4 shapes
            const blobClass = `blob-${(index % 4) + 1}`;
            
            // Stagger entrance animation
            const animationDelay = 0.05 + (index * 0.08); 

            // Safely parse and format tags if they exist
            let tagsHtml = '';
            if (official.tags) {
                tagsHtml = '<div class="divider"></div>';
                const tagsArray = official.tags.split(',');
                tagsArray.forEach(tag => {
                    tagsHtml += `<span class="tag">${window.escapeHTML(tag.trim())}</span>`;
                });
            }

            // Construct image or fallback SVG
            let imgHtml = '';
            if (official.image_url) {
                imgHtml = `<img src="${window.escapeHTML(official.image_url)}" alt="${window.escapeHTML(official.name)}">`;
            } else {
                imgHtml = `
                    <div class="placeholder">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#9b4de0" stroke-width="0.9" opacity="0.35">
                            <circle cx="12" cy="8" r="4.5"/><path d="M3 21c0-4.5 4-8 9-8s9 3.5 9 8"/>
                        </svg>
                    </div>`;
            }

            // Construct full card block
            const cardHtml = `
                <div class="team-member" style="animation-delay: ${animationDelay}s;">
                    <div class="image-wrap ${blobClass}">
                        <div class="image-inner">
                            ${imgHtml}
                        </div>
                    </div>
                    <div class="member-info">
                        <p class="role">${window.escapeHTML(official.role)}</p>
                        <h3 class="name">${window.escapeHTML(official.name)}</h3>
                        ${tagsHtml}
                    </div>
                </div>
            `;
            
            grid.insertAdjacentHTML('beforeend', cardHtml);
        });

    } catch (err) {
        console.error("Database fetch error:", err);
        grid.innerHTML = '<div style="text-align:center; width:100%; grid-column: 1/-1; color: #c8177a;">Error connecting to officials database.</div>';
    }
});
</script>

</body>
</html>
