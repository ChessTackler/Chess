<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDCA | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <a href="#" class="logo">CDCA Admin Portal</a>
        <nav><a href="index.html">View Live Database</a></nav>
    </header>

    <main>
        <div class="admin-container">
            <div class="form-card">
                <h2 style="margin-bottom: 1.5rem;">Add New Player</h2>
                <form id="add-player-form">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="first_name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="last_name" required>
                    </div>
                    <div class="form-group">
                        <label>State ID</label>
                        <input type="text" id="state_id" required>
                    </div>
                    <div class="form-group">
                        <label>FIDE ID</label>
                        <input type="text" id="fide_id">
                    </div>
                    <div class="form-group">
                        <label>FIDE Rating</label>
                        <input type="number" id="fide_rating">
                    </div>
                    <div class="form-group">
                        <label>Title</label>
                        <select id="title">
                            <option value="">None</option>
                            <option value="CM">CM</option>
                            <option value="IM">IM</option>
                            <option value="GM">GM</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Player</button>
                </form>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Rating</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Load table on start
        window.onload = () => fetchPlayers('admin-table-body', true);

        // Handle Form Submission
        document.getElementById('add-player-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addPlayer();
        });
    </script>
</body>
</html>
