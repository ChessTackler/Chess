<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- Admin Specific UI Enhancements --- */
        body { background-color: #F8FAFC; }
        .admin-header { background: var(--bg-white); padding: 2rem 5%; border-bottom: 1px solid var(--border-color); margin-bottom: 2rem; }
        .admin-header h1 { font-size: 1.8rem; color: var(--text-dark); margin-bottom: 0.5rem; }
        .admin-header p { color: var(--text-muted); font-size: 0.95rem; }
        
        .dashboard-container { padding: 0 5% 3rem 5%; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        /* Modern CSS Grid for Layout */
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; align-items: start; }
        
        .panel-card { background: var(--bg-white); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02), 0 10px 15px rgba(0,0,0,0.03); border: 1px solid rgba(226, 232, 240, 0.8); margin-bottom: 2rem; }
        .panel-title { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; color: var(--text-dark); font-size: 1.2rem; border-bottom: 2px solid var(--bg-light); padding-bottom: 0.8rem; }
        
        /* Two-column form layout */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-grid .full-width { grid-column: span 2; }
        
        /* Table Enhancements */
        .admin-table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; border: 1px solid var(--border-color); }
        .admin-table-wrapper table { width: 100%; min-width: 600px; border-collapse: collapse; }
        .admin-table-wrapper th { background: #F1F5F9; color: #475569; font-weight: 600; font-size: 0.8rem; padding: 1rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); }
        .admin-table-wrapper td { padding: 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; vertical-align: middle; }
        .admin-table-wrapper tr:last-child td { border-bottom: none; }
        
        /* Badges & Buttons */
        .badge-admin { background: #DEF7EC; color: #03543F; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .badge-user { background: #F1F5F9; color: #475569; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .action-btn { background: var(--bg-light); border: 1px solid var(--border-color); color: var(--text-dark); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
        .action-btn.delete { color: #E74C3C; background: #FDEDEC; border-color: #FADBD8; }
        .action-btn.delete:hover { background: #E74C3C; color: white; }
        .action-btn.promote { color: var(--primary-blue); background: #EBF5FF; border-color: #D1E5FA; }
        .action-btn.promote:hover { background: var(--primary-blue); color: white; }

        /* Mobile Optimization */
        @media (max-width: 992px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .form-grid .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body style="display: none;" id="secure-body"> 

    <header>
        <a href="index.html" class="logo"><img src="LogoCDCA.png" alt="CDCA Logo"></a>
        <nav>
            <a href="index.html" style="color: var(--text-muted); font-weight: 600;">← Back to Main Site</a>
            <button onclick="handleLogout()" class="action-btn delete" style="margin-left: 1rem;">Logout</button>
        </nav>
    </header>

    <div class="admin-header">
        <h1>Dashboard Overview</h1>
        <p id="welcome-text">Loading credentials...</p>
    </div>

    <div class="dashboard-container">
        <div class="dashboard-grid">
            
            <div>
                <div class="panel-card">
                    <h3 class="panel-title">➕ Register New Player</h3>
                    <form id="add-player-form">
                        <div class="form-grid">
                            <div class="form-group"><label>First Name</label><input type="text" id="first_name" required></div>
                            <div class="form-group"><label>Last Name</label><input type="text" id="last_name" required></div>
                            <div class="form-group"><label>State ID</label><input type="text" id="state_id" required></div>
                            <div class="form-group"><label>FIDE ID</label><input type="text" id="fide_id"></div>
                            <div class="form-group"><label>FIDE Rating</label><input type="number" id="fide_rating"></div>
                            <div class="form-group">
                                <label>Title</label>
                                <select id="title">
                                    <option value="">None</option>
                                    <option value="CM">CM</option>
                                    <option value="FM">FM</option>
                                    <option value="IM">IM</option>
                                    <option value="GM">GM</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn-orange full-width" style="width: 100%; margin-top: 1rem;">Save Player to Database</button>
                    </form>
                </div>
            </div>

            <div>
                <div class="panel-card">
                    <h3 class="panel-title">📋 Active Player Roster</h3>
                    <div class="admin-table-wrapper">
                        <table>
                            <thead><tr><th>Player Name</th><th>State ID</th><th>Rating</th><th>Actions</th></tr></thead>
                            <tbody id="admin-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div id="super-admin-panel" class="panel-card" style="display: none; border-color: #FAD7A1; background: #FFFBF5;">
                    <h3 class="panel-title" style="color: var(--accent-orange); border-bottom-color: #FDE8C4;">👑 Super Admin: Access Management</h3>
                    <div class="admin-table-wrapper" style="background: white;">
                        <table>
                            <thead><tr><th>User Email</th><th>Role</th><th>Manage Status</th></tr></thead>
                            <tbody id="super-admin-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js?v=2"></script>
    <script>
        window.onload = async () => {
            const access = await verifyAdminAccess();

            if (!access.allowed) {
                alert(access.error || "Security Check Failed: Please log in with an Admin account.");
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('secure-body').style.display = 'block';
            document.getElementById('welcome-text').innerHTML = `Logged in securely as <strong style="color: var(--primary-blue);">${access.email}</strong>`;
            
            fetchPlayers('admin-table-body', true);

            if (access.is_super_admin) {
                document.getElementById('super-admin-panel').style.display = 'block';
                fetchUsersForSuperAdmin();
            }
        };

        document.getElementById('add-player-form').addEventListener('submit', async (e) => {
            await addPlayer(e);
        });
    </script>
</body>
</html>
