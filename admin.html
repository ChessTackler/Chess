<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=15">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-blue: #2563eb; --primary-hover: #1d4ed8; --accent-orange: #ea580c; --bg-light: #f8fafc; --text-dark: #0f172a; --text-muted: #64748b; --border-color: #e2e8f0; --card-bg: rgba(255, 255, 255, 0.75); --danger-color: #ef4444; --danger-bg: #fef2f2; --success-color: #166534; --success-bg: #dcfce7; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); color: var(--text-dark); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); position: sticky; top: 0; z-index: 1000; }
        header nav { display: flex; align-items: center; gap: 1.5rem; }
        header nav a { color: var(--text-muted); text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.2s ease; }
        header nav a:hover { color: var(--text-dark); }
        .admin-header { padding: 3rem 5%; margin-bottom: 1rem; text-align: left; max-width: 1400px; margin: 0 auto; }
        .admin-header h1 { font-size: 2.2rem; color: var(--text-dark); margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.03em; }
        .admin-header p { color: var(--text-muted); font-size: 1.05rem; font-weight: 400; }
        .dashboard-container { padding: 0 5% 4rem 5%; max-width: 1400px; margin: 0 auto; }
        .dashboard-grid { display: grid; grid-template-columns: 400px 1fr; gap: 2.5rem; align-items: start; }
        .grid-col { min-width: 0; }
        .panel-card { background: var(--card-bg); backdrop-filter: blur(20px); padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 0.6); margin-bottom: 2rem; }
        .panel-title { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; color: var(--text-dark); font-size: 1.35rem; font-weight: 600; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border-color); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-grid .full-width { grid-column: span 2; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .form-group input { padding: 0.9rem 1.2rem; font-size: 0.95rem; color: var(--text-dark); background: #ffffff; border: 1px solid var(--border-color); border-radius: 10px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.02); }
        .form-group input:focus { outline: none; border-color: var(--primary-blue); }
        .btn-gradient { background: linear-gradient(135deg, var(--primary-blue) 0%, #1e40af 100%); width: 100%; color: white; border: none; padding: 1.1rem; border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer; }
        .action-btn { background: white; border: 1px solid var(--border-color); color: var(--text-dark); border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; padding: 0.5rem 1rem; }
        .action-btn.delete { color: var(--danger-color); background: var(--danger-bg); border-color: #fca5a5; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-grid .full-width { grid-column: span 1; } }
    </style>
</head>
<body style="display: none;" id="secure-body"> 

    <header>
        <a href="index.html" class="logo"><img src="LogoCDCA.png" alt="CDCA Logo" style="height: 40px;"></a>
        <nav>
            <a href="index.html">← Back to Site</a>
            <button onclick="handleLogout()" class="action-btn delete">Sign Out</button>
        </nav>
    </header>

    <div class="admin-header">
        <h1>Command Center</h1>
        <p id="welcome-text">Verifying secure credentials...</p>
    </div>

    <div class="dashboard-container">
        
        <div class="dashboard-grid">
            <div class="grid-col" style="grid-column: 1 / -1; margin-bottom: -1rem;"><h2 style="color: var(--text-dark); font-weight: 700;">Active Roster</h2></div>
            <div class="grid-col">
                <div class="panel-card">
                    <h3 class="panel-title"><span>➕</span> Register Active Player</h3>
                    <form id="add-player-form">
                        <div class="form-grid">
                            <div class="form-group"><label>First Name</label><input type="text" id="first_name" required></div>
                            <div class="form-group"><label>Last Name</label><input type="text" id="last_name" required></div>
                            <div class="form-group"><label>State ID</label><input type="text" id="state_id" required></div>
                            <div class="form-group"><label>FIDE ID</label><input type="text" id="fide_id"></div>
                            <div class="form-group full-width"><label>FIDE Rating</label><input type="number" id="fide_rating"></div>
                            <div class="form-group full-width"><label>Titles (Text)</label><input type="text" id="title" placeholder="e.g. CM, IM"></div>
                        </div>
                        <button type="submit" class="btn-gradient" style="margin-top: 2rem;">Save Active Player</button>
                    </form>
                </div>
            </div>

            <div class="grid-col">
                <div class="panel-card" style="padding: 0; overflow: hidden;">
                    <div style="padding: 1.5rem; background: #fafafa; border-bottom: 1px solid #e2e8f0;">
                        <input type="text" id="searchInput" placeholder="Search Active Roster..." onkeyup="window.handleGlobalSearch()" style="width: 100%; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 8px; outline: none;">
                    </div>
                    <div class="table-wrapper" style="border: none; box-shadow: none; border-radius: 0;">
                        <table>
                            <thead><tr><th>Player Name</th><th>State ID</th><th>Rating</th><th>Actions</th></tr></thead>
                            <tbody id="admin-table-body"></tbody>
                        </table>
                        <div class="pagination" style="border-radius: 0;">
                            <span class="pagination-info" id="active-page-info">Page 1</span>
                            <div class="pagination-controls">
                                <button id="active-prev" onclick="window.changeActivePage(-1)">Previous</button>
                                <button id="active-next" onclick="window.changeActivePage(1)">Next</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="super-admin-panel" class="panel-card" style="display: none; margin-top: 2rem;">
                    <h3 class="panel-title" style="color: var(--accent-orange); border-bottom-color: #fde68a;"><span>👑</span> Super Admin</h3>
                    <div class="table-wrapper" style="background: white;">
                        <table>
                            <thead><tr><th>User Email</th><th>Role</th><th>Manage Privilege</th></tr></thead>
                            <tbody id="super-admin-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <hr style="border: none; border-top: 1px solid var(--border-color); margin: 3rem 0;">

        <div class="dashboard-grid">
            <div class="grid-col" style="grid-column: 1 / -1; margin-bottom: -1rem;"><h2 style="color: var(--text-dark); font-weight: 700;">Historical Database</h2></div>
            <div class="grid-col">
                <div class="panel-card">
                    <h3 class="panel-title"><span>🏛️</span> Add Historical Player</h3>
                    <form id="add-all-time-form">
                        <div class="form-grid">
                            <div class="form-group"><label>First Name</label><input type="text" id="at_first_name" required></div>
                            <div class="form-group"><label>Last Name</label><input type="text" id="at_last_name"></div>
                            <div class="form-group"><label>CDCA ID</label><input type="text" id="at_cdca_id" placeholder="e.g. 100025" required></div>
                            <div class="form-group"><label>State ID</label><input type="text" id="at_state_id" placeholder="Pending/Optional"></div>
                            <div class="form-group"><label>FIDE ID</label><input type="text" id="at_fide_id"></div>
                            <div class="form-group"><label>FIDE Rating</label><input type="number" id="at_fide_rating"></div>
                            <div class="form-group full-width"><label>Titles (Text)</label><input type="text" id="at_title" placeholder="e.g. GM, IA, FA"></div>
                        </div>
                        <button type="submit" class="btn-gradient" style="margin-top: 2rem; background: linear-gradient(135deg, #10b981 0%, #059669 100%);">Save Historical Record</button>
                    </form>
                </div>
            </div>

            <div class="grid-col">
                <div class="panel-card" style="padding: 0; overflow: hidden;">
                    <div class="table-wrapper" style="border: none; box-shadow: none; border-radius: 0;">
                        <table>
                            <thead><tr><th>Player Name</th><th>CDCA ID</th><th>State ID</th><th>Rating</th><th>Actions</th></tr></thead>
                            <tbody id="all-time-admin-body"></tbody>
                        </table>
                        <div class="pagination" style="border-radius: 0;">
                            <span class="pagination-info" id="at-page-info">Page 1</span>
                            <div class="pagination-controls">
                                <button id="at-prev" onclick="window.changeAtPage(-1)">Previous</button>
                                <button id="at-next" onclick="window.changeAtPage(1)">Next</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=15"></script>
    <script src="players.js?v=15"></script>
    <script>
        window.onload = async () => {
            if(!window.verifyAdminAccess) return;
            const access = await window.verifyAdminAccess();
            if (!access.allowed) { window.location.href = 'login.html'; return; }

            document.getElementById('secure-body').style.display = 'block';
            document.getElementById('welcome-text').innerHTML = `Authenticated securely as <strong style="color: var(--primary-blue); word-break: break-all;">${access.email}</strong>`;

            if(window.fetchPlayers) window.fetchPlayers('admin-table-body', true);
            if(window.fetchAllTimePlayers) window.fetchAllTimePlayers('all-time-admin-body', true);

            if (access.is_super_admin && window.fetchUsersForSuperAdmin) {
                document.getElementById('super-admin-panel').style.display = 'block';
                window.fetchUsersForSuperAdmin();
            }
        };

        document.getElementById('add-player-form').addEventListener('submit', async (e) => { if(window.addPlayer) await window.addPlayer(e); });
        document.getElementById('add-all-time-form').addEventListener('submit', async (e) => { if(window.addAllTimePlayer) await window.addAllTimePlayer(e); });
    </script>
</body>
</html>
