<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=11">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 2.5rem 5%; border-bottom: 1px solid rgba(255, 255, 255, 0.6); margin-bottom: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); width: 100%; }
        .admin-header h1 { font-size: 1.8rem; color: #1e293b; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .admin-header p { color: #64748b; font-size: 0.95rem; word-wrap: break-word; }
        .dashboard-container { padding: 0 5% 3rem 5%; max-width: 1400px; margin: 0 auto; width: 100%; }
        .dashboard-grid { display: grid; grid-template-columns: minmax(300px, 350px) 1fr; gap: 2rem; align-items: start; width: 100%; }
        .grid-col { min-width: 0; width: 100%; max-width: 100%; }
        
        /* Removed overflow: hidden here so dropdowns don't clip */
        .panel-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.8); border: 1px solid rgba(226, 232, 240, 0.8); margin-bottom: 2rem; width: 100%; max-width: 100%; box-sizing: border-box; }
        
        .panel-title { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; color: #0f172a; font-size: 1.25rem; font-weight: 700; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; width: 100%; }
        .form-grid .full-width { grid-column: span 2; }
        
        .custom-select-wrapper { position: relative; user-select: none; width: 100%; max-width: 100%; }
        .custom-select { position: relative; display: flex; flex-direction: column; z-index: 100; } /* High Z-index */
        .custom-select-trigger { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1rem; font-size: 16px; color: #1e293b; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .custom-select-trigger:hover { border-color: #cbd5e1; }
        .custom-select.open .custom-select-trigger { border-color: var(--primary-blue); background: white; box-shadow: 0 0 0 3px rgba(74,144,226,0.15); }
        .arrow { width: 10px; height: 10px; border-bottom: 2px solid #94a3b8; border-right: 2px solid #94a3b8; transform: translateY(-2px) rotate(45deg); transition: transform 0.3s; }
        .custom-select.open .arrow { transform: translateY(2px) rotate(-135deg); border-color: var(--primary-blue); }
        
        /* Added Scrollability to Options */
        .custom-options { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(-10px) scale(0.98); transition: all 0.25s; overflow-x: hidden; overflow-y: auto; max-height: 220px; transform-origin: top; z-index: 999; }
        .custom-options::-webkit-scrollbar { width: 5px; }
        .custom-options::-webkit-scrollbar-track { background: transparent; margin: 5px; }
        .custom-options::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0) scale(1); }
        .custom-option { display: block; padding: 0.9rem 1.2rem; font-size: 0.95rem; color: #475569; font-weight: 500; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .custom-option:hover, .custom-option.selected { background: #f0f9ff; color: var(--primary-blue); font-weight: 600; padding-left: 1.5rem; }
        
        .admin-table-wrapper { width: 100%; max-width: 100%; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; border: 1px solid #e2e8f0; background: white; }
        .admin-table-wrapper::-webkit-scrollbar { height: 6px; }
        .admin-table-wrapper::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .admin-table-wrapper::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .admin-table-wrapper table { width: 100%; min-width: 600px; border-collapse: collapse; }
        .admin-table-wrapper th { background: #f8fafc; color: #475569; font-weight: 600; font-size: 0.75rem; padding: 1rem; text-transform: uppercase; white-space: nowrap; border-bottom: 1px solid #e2e8f0;}
        .admin-table-wrapper td { padding: 1rem; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
        
        .badge-admin { background: #dcfce7; color: #166534; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .badge-user { background: #f1f5f9; color: #475569; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .action-btn { background: white; border: 1px solid #e2e8f0; color: #334155; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
        .action-btn.delete { color: #ef4444; border-color: #fee2e2; background: #fef2f2; }
        .action-btn.promote { color: var(--primary-blue); border-color: #e0f2fe; background: #f0f9ff; }
        
        .btn-gradient { background: linear-gradient(135deg, var(--accent-orange) 0%, #e67e22 100%); width: 100%; color: white; border: none; padding: 1rem; border-radius: 10px; font-weight: 700; font-size: 1rem; box-shadow: 0 4px 15px rgba(245, 166, 35, 0.3); transition: all 0.3s; cursor: pointer; }
        #super-admin-panel { background: linear-gradient(135deg, #fffbf5 0%, #fff6e5 100%); border-color: #fde8c4; }
        #super-admin-panel th { background: #fef3c7; color: #92400e; border-color: #fde68a; }

        @media (max-width: 992px) {
            .dashboard-grid { grid-template-columns: 1fr; gap: 1rem; }
            .dashboard-container { padding: 0 1rem 2rem 1rem; }
            .admin-header { padding: 1.5rem 1rem; }
            .panel-card { padding: 1.2rem; border-radius: 12px; margin-bottom: 1rem; }
            .form-grid { grid-template-columns: 1fr; gap: 1rem; }
            .form-grid .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body style="display: none;" id="secure-body"> 

    <header>
        <a href="index.html" class="logo"><img src="LogoCDCA.png" alt="CDCA Logo" style="height: 40px;"></a>
        <nav>
            <a href="index.html" style="color: #64748b; font-weight: 600; font-size: 0.9rem;">← Exit</a>
            <button onclick="handleLogout()" class="action-btn delete" style="margin-left: 0.5rem; padding: 0.4rem 0.8rem;">Logout</button>
        </nav>
    </header>

    <div class="admin-header">
        <h1>Command Center</h1>
        <p id="welcome-text">Loading secure credentials...</p>
    </div>

    <div class="dashboard-container">
        <div class="dashboard-grid">
            
            <div class="grid-col">
                <div class="panel-card">
                    <h3 class="panel-title">➕ Register Player</h3>
                    <form id="add-player-form">
                        <div class="form-grid">
                            <div class="form-group"><label>First Name</label><input type="text" id="first_name" required></div>
                            <div class="form-group"><label>Last Name</label><input type="text" id="last_name" required></div>
                            <div class="form-group"><label>State ID</label><input type="text" id="state_id" required></div>
                            <div class="form-group"><label>FIDE ID</label><input type="text" id="fide_id"></div>
                            <div class="form-group full-width"><label>FIDE Rating</label><input type="number" id="fide_rating" placeholder="Leave blank if unrated"></div>
                            
                            <div class="form-group full-width">
                                <label>Master Title</label>
                                <select id="title" style="display: none;">
                                    <option value="">None</option><option value="CM">CM</option><option value="FM">FM</option><option value="IM">IM</option><option value="GM">GM</option>
                                </select>
                                
                                <div class="custom-select-wrapper">
                                    <div class="custom-select" id="custom-title-select">
                                        <div class="custom-select-trigger"><span id="custom-select-text">None</span><div class="arrow"></div></div>
                                        <div class="custom-options">
                                            <span class="custom-option selected" data-value="">None</span>
                                            <span class="custom-option" data-value="CM">CM (Candidate Master)</span>
                                            <span class="custom-option" data-value="FM">FM (FIDE Master)</span>
                                            <span class="custom-option" data-value="IM">IM (International Master)</span>
                                            <span class="custom-option" data-value="GM">GM (Grandmaster)</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn-gradient" style="margin-top: 1.5rem;">Save Player Record</button>
                    </form>
                </div>
            </div>

            <div class="grid-col">
                <div class="panel-card">
                    <h3 class="panel-title">📋 Active Roster</h3>
                    <div class="admin-table-wrapper">
                        <table>
                            <thead><tr><th>Player Name</th><th>State ID</th><th>Rating</th><th>Actions</th></tr></thead>
                            <tbody id="admin-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div id="super-admin-panel" class="panel-card" style="display: none;">
                    <h3 class="panel-title" style="color: #ea580c; border-bottom-color: #fde68a;">👑 Super Admin Access</h3>
                    <div class="admin-table-wrapper" style="background: white;">
                        <table>
                            <thead><tr><th>User Email</th><th>Role</th><th>Manage Privilege</th></tr></thead>
                            <tbody id="super-admin-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js?v=11"></script>
    <script>
        window.onload = async () => {
            const access = await verifyAdminAccess();
            if (!access.allowed) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('secure-body').style.display = 'block';
            document.getElementById('welcome-text').innerHTML = `Authenticated securely as <strong style="color: var(--primary-blue); word-break: break-all;">${access.email}</strong>`;
            
            fetchPlayers('admin-table-body', true);

            if (access.is_super_admin) {
                document.getElementById('super-admin-panel').style.display = 'block';
                fetchUsersForSuperAdmin();
            }

            // Custom Select UI logic for Main Form
            const customSelect = document.getElementById('custom-title-select');
            const customSelectTrigger = customSelect.querySelector('.custom-select-trigger');
            const customOptions = customSelect.querySelectorAll('.custom-option');
            const realSelect = document.getElementById('title');
            const customSelectText = document.getElementById('custom-select-text');

            customSelectTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                
                // Close any other open dropdowns first
                document.querySelectorAll('.custom-select.open').forEach(sel => {
                    if(sel !== customSelect) sel.classList.remove('open');
                });
                
                customSelect.classList.toggle('open');
            });

            customOptions.forEach(option => {
                option.addEventListener('click', function(e) {
                    e.stopPropagation();
                    customOptions.forEach(opt => opt.classList.remove('selected')); 
                    this.classList.add('selected'); 
                    customSelectText.innerText = this.innerText; 
                    realSelect.value = this.getAttribute('data-value'); 
                    customSelect.classList.remove('open'); 
                });
            });

            // Universal Click Listener to close any open custom-selects
            document.addEventListener('click', function(e) {
                document.querySelectorAll('.custom-select.open').forEach(select => {
                    if (!select.contains(e.target)) { select.classList.remove('open'); }
                });
            });
        };

        document.getElementById('add-player-form').addEventListener('submit', async (e) => {
            await addPlayer(e);
        });
    </script>
</body>
</html>
