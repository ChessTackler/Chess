<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <header class="app-header">
        <div class="brand-zone">
            <span class="header-title">Command Center</span>
        </div>
        <button class="button" style="padding: 0.5em 1em; font-size: 12px;" onclick="window.handleLogout()"><div class="text">END SESSION</div></button>
    </header>

    <div id="auth-message" class="loader-screen">
        <div class="chess-loader"></div>
        <p style="margin-top: 15px; font-weight: 600; font-family: 'Playfair Display'; font-size: 1.2rem;">Authenticating Module...</p>
    </div>

    <div id="admin-content" style="display: none;" class="layout-container">
        
        <aside class="sidebar-nav">
            <div class="user-profile">
                <div class="avatar">A</div>
                <div class="user-info">
                    <p class="role-badge">System Admin</p>
                    <p class="user-email">admin@cdca.in</p>
                </div>
            </div>
            <nav class="tab-list">
                <button class="nav-btn active" onclick="switchAdminTab('tab-news')">📰 News & Media</button>
                <button class="nav-btn" onclick="switchAdminTab('tab-players')">♟️ Master Database</button>
            </nav>
        </aside>

        <main class="workspace">
            
            <div id="tab-news" class="workspace-panel active">
                <div class="header-flex"><h2>Publishing Desk</h2></div>
                <div class="split-layout">
                    <div class="form-card">
                        <h3>Draft New Article</h3>
                        <form id="add-news-form">
                            <label>Headline</label>
                            <div class="textInputWrapper"><input type="text" id="news_title" required class="textInput"></div>
                            <label>Tags</label>
                            <div class="textInputWrapper"><input type="text" id="news_tags" class="textInput"></div>
                            <button type="button" class="button" style="width: 100%; margin-top: 15px;"><div class="text">PUBLISH</div></button>
                        </form>
                    </div>
                    <div class="data-card">
                        <div class="card-title">Live Articles</div>
                        <table class="modern-table">
                            <thead><tr><th>Article Info</th><th>Date</th><th style="text-align: right;">Actions</th></tr></thead>
                            <tbody id="admin-news-tbody"><tr><td colspan="3" style="text-align:center;">No news available.</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-players" class="workspace-panel">
                <div class="header-flex"><h2>Master Player Registry</h2></div>
                <div class="form-card compact-form mb-4">
                    <h3>Manual Entry Override</h3>
                    <form id="add-player-form">
                        <div class="grid-4">
                            <div><label>First Name</label><div class="textInputWrapper"><input type="text" id="first_name" required class="textInput"></div></div>
                            <div><label>CDCA ID</label><div class="textInputWrapper"><input type="text" id="cdca_id" required class="textInput"></div></div>
                        </div>
                        <button type="button" class="button" style="margin-top: 10px;"><div class="text">INJECT RECORD</div></button>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authMessage = document.getElementById('auth-message');
            const adminContent = document.getElementById('admin-content');
            
            // Wait 1.5 seconds to simulate secure auth feel, then unhide the sleek UI.
            setTimeout(async () => {
                try {
                    // If you have backend logic hooked up, it executes here.
                    if (typeof window.verifyAdminAccess === 'function') {
                        const auth = await window.verifyAdminAccess();
                        if (!auth.allowed) {
                            authMessage.innerHTML = "<h2 style='color:red;'>Access Denied. Redirecting...</h2>";
                            setTimeout(()=> window.location.href='index.html', 1500);
                            return;
                        }
                    }
                    // Success / Bypass Logic
                    authMessage.style.display = 'none';
                    adminContent.style.display = 'flex';
                } catch (error) {
                    console.warn("Backend missing. Bypassing lock for UI testing mode.");
                    authMessage.style.display = 'none';
                    adminContent.style.display = 'flex';
                }
            }, 1200);
        });

        function switchAdminTab(tabId) {
            document.querySelectorAll('.workspace-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
