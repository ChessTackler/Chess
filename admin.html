<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDCA Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: none;" id="admin-body"> <header>
        <a href="index.html" class="logo">CDCA Admin</a>
        <nav id="main-nav">
            </nav>
    </header>

    <div class="container">
        <h2 class="section-title" style="text-align: left;">Dashboard Overview</h2>
        
        <h3 style="margin-bottom: 1rem;">📰 Publish News & Updates</h3>
        <div class="admin-card">
            <form id="add-news-form" onsubmit="window.addNews(event)">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
                    <div class="form-group">
                        <label>Article Title</label>
                        <input type="text" id="news_title" required placeholder="E.g. Grandmaster achieves new peak...">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="news_category" required>
                            <option value="Headline">Headline (Requires Image)</option>
                            <option value="Announcement">Announcement (Text Only)</option>
                        </select>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem;">
                    <div class="form-group">
                        <label>Tags (Comma separated)</label>
                        <input type="text" id="news_tags" required placeholder="CDCA HEADLINES, NEWS">
                    </div>
                    <div class="form-group">
                        <label>Image URL (Required for Headlines)</label>
                        <input type="url" id="news_image" placeholder="https://image-link.com/img.jpg">
                    </div>
                </div>
                <button type="submit" class="btn-orange">Publish Article</button>
            </form>
        </div>

        <div class="table-wrapper" style="margin-bottom: 3rem;">
            <table>
                <thead>
                    <tr>
                        <th>Article Title</th>
                        <th>Category</th>
                        <th>Date Published</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-news-tbody"></tbody>
            </table>
        </div>

        <h3 style="margin-bottom: 1rem;">♟️ Add New Player</h3>
        <div class="admin-card">
            <form id="add-player-form" onsubmit="window.addPlayer(event)">
                <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:1rem; margin-bottom:1rem;">
                    <div class="form-group"><label>First Name*</label><input type="text" id="first_name" required></div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="last_name"></div>
                    <div class="form-group"><label>CDCA ID*</label><input type="text" id="cdca_id" required></div>
                    <div class="form-group"><label>State ID</label><input type="text" id="state_id"></div>
                </div>
                <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:1rem; margin-bottom:1.5rem;">
                    <div class="form-group"><label>FIDE ID</label><input type="text" id="fide_id"></div>
                    <div class="form-group"><label>FIDE Rating</label><input type="number" id="fide_rating"></div>
                    <div class="form-group"><label>Titles (e.g. GM, IM)</label><input type="text" id="title"></div>
                    <div class="form-group">
                        <label>Status*</label>
                        <select id="id_status" required>
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-orange">Add Player to Database</button>
            </form>
        </div>

        <div class="search-box" style="margin-bottom: 1.5rem; max-width: 400px; box-shadow: var(--shadow-sm);">
            <input type="text" id="searchInput" placeholder="Search Database..." onkeyup="handleGlobalSearch()">
        </div>

        <div class="table-wrapper" style="margin-bottom: 3rem;">
            <table>
                <thead>
                    <tr>
                        <th>Player Name</th>
                        <th>CDCA ID</th>
                        <th>State ID</th>
                        <th>Rating</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-tbody"></tbody>
            </table>
            <div class="pagination">
                <span class="pagination-info" id="page-info">Page 1 of 1</span>
                <div class="pagination-controls">
                    <button id="page-prev" onclick="changePage(-1)" disabled>Previous</button>
                    <button id="page-next" onclick="changePage(1)" disabled>Next</button>
                </div>
            </div>
        </div>

        <div id="super-admin-section" style="display: none;">
            <h3 style="margin-bottom: 1rem;">🛡️ Super Admin - User Roles</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>User Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="super-admin-table-body"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        // Secure page load
        document.addEventListener('DOMContentLoaded', async () => {
            const auth = await window.verifyAdminAccess();
            if (!auth.allowed) {
                alert("Access Denied. You must be an admin.");
                window.location.href = 'index.html';
            } else {
                document.getElementById('admin-body').style.display = 'block';
                if (auth.is_super_admin) {
                    document.getElementById('super-admin-section').style.display = 'block';
                    window.fetchUsersForSuperAdmin();
                }
            }
        });
    </script>
</body>
</html>
