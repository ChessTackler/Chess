<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - CDCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</head>
<body>

    <header class="app-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <a href="adminportal.html" class="button back-btn" style="text-decoration: none; padding: 0.5em 0.8em;">
                <div class="text">← BACK TO PORTAL</div>
            </a>
            <div class="brand-zone" style="display: flex; align-items: center; gap: 8px;">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16"/><path d="M6 18v-4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4"/><path d="M12 12v-6"/><path d="M9 6a3 3 0 1 1 6 0 3 3 0 0 1-6 0"/></svg>
                <span class="header-title">Command Center</span>
            </div>
        </div>
        <button class="button" style="padding: 0.5em 1em; font-size: 12px;" onclick="confirmLogout()">
            <div class="text">LOGOUT</div>
        </button>
    </header>

    <div id="top-navigation" style="display: none;">
        <nav class="top-nav">
            <div class="nav-container">
                <button class="nav-btn active" onclick="switchAdminTab('tab-news')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15"/></svg>
                    News & Media
                </button>
                <button class="nav-btn" onclick="switchAdminTab('tab-players')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>
                    Master Database
                </button>
            </div>
        </nav>
    </div>

    <div id="auth-message" class="loader-screen">
        <div class="chess-loader"></div>
        <p style="margin-top: 15px; font-weight: 600; font-family: 'Playfair Display'; font-size: 1.2rem;">Authenticating Module...</p>
    </div>

    <main id="admin-content" style="display: none;" class="workspace">
        <div id="tab-news" class="workspace-panel active">
            <div class="header-flex"><h2>Publishing Desk</h2></div>
            <div class="split-layout">
                <div class="form-card">
                    <h3>Draft New Article</h3>
                    <form id="add-news-form" onsubmit="window.addNews(event)">
                        <label>Headline</label>
                        <div class="textInputWrapper"><input type="text" id="news_title" required class="textInput"></div>

                        <div class="grid-2">
                            <div><label>Category</label><div class="textInputWrapper"><select id="news_category" class="textInput" style="padding: 11px;"><option value="Announcement">Announcement</option><option value="Headline">Headline</option></select></div></div>
                            <div><label>Tags</label><div class="textInputWrapper"><input type="text" id="news_tags" placeholder="e.g. U-14, State" class="textInput"></div></div>
                        </div>

                        <div class="grid-2">
                            <div><label>Date</label><div class="textInputWrapper"><input type="date" id="news_date" class="textInput"></div></div>
                            <div><label>Time</label><div class="textInputWrapper"><input type="time" id="news_time" class="textInput"></div></div>
                        </div>

                        <label>Image URL</label>
                        <div class="textInputWrapper"><input type="url" id="news_image" placeholder="https://..." class="textInput"></div>

                        <button type="submit" class="button" style="width: 100%; margin-top: 15px;"><div class="text">PUBLISH</div></button>
                    </form>
                </div>
                <div class="data-card">
                    <div class="card-title">Live Articles</div>
                    <div class="table-responsive">
                        <table class="modern-table">
                            <thead><tr><th>Article Info</th><th>Date</th><th style="text-align: right;">Actions</th></tr></thead>
                            <tbody id="admin-news-tbody"><tr><td colspan="3" style="text-align:center;">Loading...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-players" class="workspace-panel">
            <div class="header-flex"><h2>Master Player Registry</h2></div>
            <div class="split-layout">
                <div class="form-card compact-form">
                    <h3>Manual Entry Override</h3>
                    <form id="add-player-form" onsubmit="window.addPlayer(event)">
                        <div class="grid-2">
                            <div><label>First Name</label><div class="textInputWrapper"><input type="text" id="first_name" required class="textInput"></div></div>
                            <div><label>Last Name</label><div class="textInputWrapper"><input type="text" id="last_name" class="textInput"></div></div>
                        </div>
                        <div class="grid-2">
                            <div><label>CDCA ID</label><div class="textInputWrapper"><input type="text" id="cdca_id" required class="textInput"></div></div>
                            <div><label>State ID</label><div class="textInputWrapper"><input type="text" id="state_id" class="textInput"></div></div>
                        </div>
                        <div class="grid-2">
                            <div><label>FIDE ID</label><div class="textInputWrapper"><input type="text" id="fide_id" class="textInput"></div></div>
                            <div><label>Rating</label><div class="textInputWrapper"><input type="number" id="fide_rating" class="textInput"></div></div>
                        </div>
                        <div class="grid-2">
                            <div><label>Titles (CSV)</label><div class="textInputWrapper"><input type="text" id="title" placeholder="e.g. CM, FM" class="textInput"></div></div>
                            <div><label>Status</label><div class="textInputWrapper"><select id="id_status" class="textInput" style="padding: 11px;"><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div></div>
                        </div>
                        <button type="submit" class="button" style="margin-top: 10px; width: 100%;"><div class="text">INJECT RECORD</div></button>
                    </form>
                </div>

                <div class="data-card">
                    <div class="card-title list-header-mobile">
                        Database Records
                        <div class="textInputWrapper search-wrap"><input type="text" id="searchInput" onkeyup="window.handleGlobalSearch()" placeholder="Search..." class="textInput" style="padding: 8px 12px; font-size:12px;"></div>
                    </div>
                    <div class="table-responsive">
                        <table class="modern-table">
                            <thead><tr><th>Player</th><th>CDCA ID</th><th>State ID</th><th>Rating</th><th>Status</th><th style="text-align: right;">Action</th></tr></thead>
                            <tbody id="admin-players-tbody"><tr><td colspan="6" style="text-align:center;">Loading...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="edit-article-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content form-card">
            <button class="modal-close-btn" onclick="closeEditModal()">×</button>
            <h3 style="margin-top:0;">✏️ Edit Article</h3>
            <form id="edit-news-form" onsubmit="window.updateNews(event)">
                <input type="hidden" id="edit_news_id">
                
                <label>Article Title</label>
                <div class="textInputWrapper"><input type="text" id="edit_news_title" required class="textInput"></div>

                <div class="grid-2">
                    <div><label>Category</label><div class="textInputWrapper"><select id="edit_news_category" class="textInput" style="padding: 11px;"><option value="Announcement">Announcement</option><option value="Headline">Headline</option></select></div></div>
                    <div><label>Tags</label><div class="textInputWrapper"><input type="text" id="edit_news_tags" class="textInput"></div></div>
                </div>

                <div class="grid-2">
                    <div><label>Date</label><div class="textInputWrapper"><input type="date" id="edit_news_date" class="textInput"></div></div>
                    <div><label>Time</label><div class="textInputWrapper"><input type="time" id="edit_news_time" class="textInput"></div></div>
                </div>

                <button type="submit" class="button" style="width: 100%; margin-top: 15px;"><div class="text">SAVE CHANGES</div></button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authMessage = document.getElementById('auth-message');
            const adminContent = document.getElementById('admin-content');
            const topNavigation = document.getElementById('top-navigation');

            setTimeout(async () => {
                if (window.verifyAdminAccess) {
                    const auth = await window.verifyAdminAccess();
                    if (!auth.allowed) {
                        authMessage.innerHTML = "<h2 style='color:red;'>Access Denied. Redirecting...</h2>";
                        setTimeout(()=> window.location.href='index.html', 1500);
                        return;
                    }
                    authMessage.style.display = 'none';
                    topNavigation.style.display = 'block';
                    adminContent.style.display = 'block';
                    if(window.fetchAdminNews) window.fetchAdminNews();
                    if(window.fetchPlayers) window.fetchPlayers('admin-players-tbody', true);
                } else {
                    authMessage.innerHTML = "<h2 style='color:red;'>System Offline. Cannot reach database.</h2>";
                }
            }, 800);
        });

        function switchAdminTab(tabId) {
            document.querySelectorAll('.workspace-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function confirmLogout() {
            if (confirm("Are you sure you want to log out?")) {
                if(window.handleLogout) {
                    window.handleLogout();
                } else {
                    window.location.href = 'index.html'; 
                }
            }
        }

        // Functions to handle the new Edit Modal UI
        function openEditModal() {
            document.getElementById('edit-article-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-article-modal').style.display = 'none';
        }
    </script>
</body>
</html>
