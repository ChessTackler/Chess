<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center - CDCA Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <div class="brand-zone">
            <img src="LogoCDCA.png" alt="CDCA Logo" class="brand-logo" onerror="this.src='https://via.placeholder.com/120x42?text=CDCA'">
            <div class="v-divider"></div>
            <span class="header-title">Command Center</span>
        </div>
        <button onclick="window.handleLogout()" class="btn-logout">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            End Session
        </button>
    </header>

    <div id="auth-message" class="loader-screen">
        <div class="chess-loader"></div>
        <p>Establishing secure connection...</p>
    </div>

    <div id="admin-content" style="display: none;" class="layout-container">
        
        <aside class="sidebar-nav">
            <div class="user-profile">
                <div class="avatar">A</div>
                <div class="user-info">
                    <p class="role-badge">System Admin</p>
                    <p id="admin-welcome-text" class="user-email">admin@cdca.in</p>
                </div>
            </div>
            <nav class="tab-list">
                <button class="nav-btn active" onclick="window.switchAdminTab('tab-news')">📰 News & Publishing</button>
                <button class="nav-btn" onclick="window.switchAdminTab('tab-players')">♟️ Master Database</button>
                <button class="nav-btn" id="super-admin-tab-btn" style="display:none;" onclick="window.switchAdminTab('tab-users')">🛡️ Access Control</button>
            </nav>
        </aside>

        <main class="workspace">
            
            <div id="tab-news" class="workspace-panel active">
                <div class="header-flex">
                    <h2>Publishing Desk</h2>
                </div>
                <div class="split-layout">
                    <div class="form-card">
                        <h3>Draft New Article</h3>
                        <form id="add-news-form" onsubmit="window.addNews(event)">
                            <div class="input-group"><label>Headline</label><input type="text" id="news_title" required></div>
                            <div class="grid-2">
                                <div class="input-group"><label>Category</label><select id="news_category"><option>Headline</option><option>Announcement</option></select></div>
                                <div class="input-group"><label>Tags</label><input type="text" id="news_tags"></div>
                            </div>
                            <div class="input-group"><label>Cover Image URL</label><input type="url" id="news_image"></div>
                            <button type="submit" class="btn-solid">Publish to Site</button>
                        </form>
                    </div>
                    <div class="data-card">
                        <div class="card-title">Live Articles</div>
                        <table class="modern-table">
                            <thead><tr><th>Article Info</th><th>Date</th><th style="text-align: right;">Actions</th></tr></thead>
                            <tbody id="admin-news-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-players" class="workspace-panel">
                <div class="header-flex">
                    <h2>Master Player Registry</h2>
                </div>
                <div class="form-card compact-form mb-4">
                    <h3>Manual Entry Override</h3>
                    <form id="add-player-form" onsubmit="window.addPlayer(event)">
                        <div class="grid-4">
                            <div class="input-group"><label>First Name</label><input type="text" id="first_name" required></div>
                            <div class="input-group"><label>Last Name</label><input type="text" id="last_name"></div>
                            <div class="input-group"><label>CDCA ID</label><input type="text" id="cdca_id" required></div>
                            <div class="input-group"><label>Status</label><select id="id_status"><option>Active</option><option>Inactive</option></select></div>
                        </div>
                        <button type="submit" class="btn-solid outline">Inject Record</button>
                    </form>
                </div>

                <div class="data-card">
                    <div class="card-top-bar">
                        <div class="search-wrap"><input type="text" id="searchInput" placeholder="Search Master DB..." onkeyup="handleGlobalSearch()"></div>
                    </div>
                    <table class="modern-table">
                        <thead><tr><th>Name</th><th>CDCA ID</th><th>State ID</th><th>Rating</th><th>Status</th><th style="text-align: right;">Actions</th></tr></thead>
                        <tbody id="admin-tbody"></tbody>
                    </table>
                </div>
            </div>

            </main>
    </div>

    <script src="app.js"></script>
    <script>
        // Use identical verification script logic from your original code here
    </script>
</body>
</html>
