<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDCA | Player Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <a href="#" class="logo">CDCA</a>
        <nav><a href="index.html">Database</a> <a href="admin.html">Admin</a></nav>
    </header>

    <main>
        <h1 style="font-family: var(--font-heading); margin-bottom: 2rem; text-align: center;">Official Player Database</h1>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>State ID</th>
                        <th>FIDE ID</th>
                        <th>Rating</th>
                        <th>Title</th>
                    </tr>
                </thead>
                <tbody id="public-table-body">
                    <tr><td colspan="5" style="text-align: center;">Loading players...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Call the fetch function from app.js when page loads
        window.onload = () => fetchPlayers('public-table-body');
    </script>
</body>
</html>
