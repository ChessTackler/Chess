<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue - CDCA Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <link rel="stylesheet" href="adminaccess.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="brand-zone">
            <span class="header-title">Review Queue Module</span>
        </div>
        <div style="display: flex; gap: 1rem;">
            <a href="admin.html" style="text-decoration:none;"><button class="button"><div class="text">BACK</div></button></a>
        </div>
    </header>

    <div id="auth-message" style="text-align: center; margin-top: 100px;">
        <p style="font-weight: 600; font-size: 1.2rem;">Authenticating Module...</p>
    </div>

    <div id="admin-content" style="display: none;" class="wide-container">

        <div class="page-header">
            <h1 class="portal-title">Application Verification</h1>
            <p class="portal-subtitle">Cross-reference uploaded IDs and UPI transactions before granting master database access.</p>
        </div>

        <div class="data-card">
            <div class="toolbar" style="display: flex; gap: 20px; align-items: center;">
                <div class="textInputWrapper" style="width: 200px; margin: 0;">
                    <select id="statusFilter" class="textInput" style="padding: 10px;">
                        <option value="All">View All</option>
                        <option value="Pending" selected>Pending Review</option>
                    </select>
                </div>
                <div class="textInputWrapper" style="width: 350px; margin: 0;">
                    <input type="text" id="regSearchInput" placeholder="Search UTR, Name, ID..." class="textInput" onkeyup="window.filterRegisteredList()">
                </div>
            </div>

            <table class="review-table">
                <thead>
                    <tr><th>Player Name</th><th>Contact Data</th><th>Gen. ID</th><th>Status</th><th style="text-align: right;">Action</th></tr>
                </thead>
                <tbody id="registered-tbody"> <tr><td colspan="5" style="text-align:center; padding: 2rem;">Loading pending applications...</td></tr>
                </tbody>
            </table>
        </div>

    </div>
    
    <script src="adminaccess.js"></script>
</body>
</html>
