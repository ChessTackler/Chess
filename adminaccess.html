<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue - CDCA Review</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="adminaccess.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="app-header">
        <div class="brand-zone">
            <span class="header-title">Review Queue Module</span>
        </div>
        <div style="display: flex; gap: 1rem;">
            <a href="admin.html" class="btn-return">Dashboard</a>
            <button onclick="window.handleLogout()" class="btn-logout">End Session</button>
        </div>
    </header>

    <div id="admin-content" class="wide-container">
        
        <div class="page-header">
            <h1 class="portal-title">Application Verification</h1>
            <p class="portal-subtitle">Cross-reference uploaded IDs and UPI transactions before granting master database access.</p>
        </div>

        <div class="data-card">
            <div class="toolbar">
                <div class="filter-group">
                    <select id="statusFilter" onchange="window.filterRegistrations()">
                        <option value="All">View All</option>
                        <option value="Pending" selected>Pending Review</option>
                        <option value="Active">Approved</option>
                    </select>
                </div>
                <div class="search-wrap">
                    <input type="text" id="regSearchInput" placeholder="Search UTR, Name, ID..." onkeyup="window.filterRegistrations()">
                </div>
            </div>

            <table class="review-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Gen. ID</th>
                        <th>Applicant</th>
                        <th>Contact Data</th>
                        <th>UTR Payment</th>
                        <th>Status</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="registration-tbody"></tbody>
            </table>
        </div>

    </div>
    <script src="app.js"></script>
    <script src="adminaccess.js"></script>
</body>
</html>
